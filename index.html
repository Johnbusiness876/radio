<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusTime</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,600,700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root,[data-theme="light"]{
      --bg:#f7f6f2;--surface:#f9f8f5;--surface-2:#fbfbf9;--surface-off:#f3f0ec;
      --divider:#dcd9d5;--border:#d4d1ca;
      --text:#28251d;--text-muted:#7a7974;--text-faint:#bab9b4;
      --primary:#01696f;--primary-h:#0c4e54;--primary-hl:#cedcd8;--primary-hl2:#e2eeec;
      --error:#a12c7b;--error-h:#7d1e5e;
      --success:#437a22;
      --sh-sm:0 1px 2px oklch(0.2 0.01 80/0.06);
      --sh-md:0 4px 14px oklch(0.2 0.01 80/0.09);
      --sh-lg:0 12px 32px oklch(0.2 0.01 80/0.13);
      --r-sm:.375rem;--r-md:.5rem;--r-lg:.75rem;--r-xl:1rem;--r-full:9999px;
      --font:'Satoshi','Inter',sans-serif;
      --tx-xs:clamp(.75rem,.7rem + .25vw,.875rem);
      --tx-sm:clamp(.875rem,.8rem + .35vw,1rem);
      --tx-base:clamp(1rem,.95rem + .25vw,1.125rem);
      --tx-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
      --tx-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
      --sp-1:.25rem;--sp-2:.5rem;--sp-3:.75rem;--sp-4:1rem;--sp-5:1.25rem;
      --sp-6:1.5rem;--sp-8:2rem;--sp-10:2.5rem;--sp-12:3rem;--sp-16:4rem;
      --ease:180ms cubic-bezier(.16,1,.3,1);
    }
    [data-theme="dark"]{
      --bg:#171614;--surface:#1c1b19;--surface-2:#201f1d;--surface-off:#1d1c1a;
      --divider:#262523;--border:#393836;
      --text:#cdccca;--text-muted:#797876;--text-faint:#5a5957;
      --primary:#4f98a3;--primary-h:#227f8b;--primary-hl:#1e3135;--primary-hl2:#182a2d;
      --error:#d163a7;--error-h:#b9478f;
      --success:#6daa45;
      --sh-sm:0 1px 2px oklch(0 0 0/.2);
      --sh-md:0 4px 14px oklch(0 0 0/.3);
      --sh-lg:0 12px 32px oklch(0 0 0/.4);
    }
    @media(prefers-color-scheme:dark){:root:not([data-theme]){
      --bg:#171614;--surface:#1c1b19;--surface-2:#201f1d;--surface-off:#1d1c1a;
      --divider:#262523;--border:#393836;
      --text:#cdccca;--text-muted:#797876;--text-faint:#5a5957;
      --primary:#4f98a3;--primary-h:#227f8b;--primary-hl:#1e3135;--primary-hl2:#182a2d;
      --error:#d163a7;--sh-sm:0 1px 2px oklch(0 0 0/.2);
      --sh-md:0 4px 14px oklch(0 0 0/.3);--sh-lg:0 12px 32px oklch(0 0 0/.4);
    }}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
    body{min-height:100dvh;font-family:var(--font);font-size:var(--tx-base);color:var(--text);background:var(--bg);line-height:1.6}
    button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
    img,svg{display:block}
    a,button,[role="button"],input{transition:color var(--ease),background var(--ease),border-color var(--ease),box-shadow var(--ease)}
    :focus-visible{outline:2px solid var(--primary);outline-offset:3px;border-radius:var(--r-sm)}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}

    /* ─── HEADER ─── */
    .hdr{display:flex;align-items:center;justify-content:space-between;padding:var(--sp-3) var(--sp-6);background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:var(--sh-sm)}
    .logo{display:flex;align-items:center;gap:var(--sp-2);font-weight:700;font-size:var(--tx-lg);color:var(--text);text-decoration:none}
    .logo-svg{color:var(--primary)}
    .icon-btn{width:36px;height:36px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;color:var(--text-muted)}
    .icon-btn:hover{background:var(--surface-off);color:var(--text)}

    /* ─── NAV ─── */
    .nav{display:flex;gap:0;padding:0 var(--sp-6);background:var(--surface);border-bottom:1px solid var(--border)}
    .nav-tab{display:flex;align-items:center;gap:var(--sp-2);padding:var(--sp-3) var(--sp-5);font-size:var(--tx-sm);font-weight:500;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-1px;border-radius:var(--r-sm) var(--r-sm) 0 0;white-space:nowrap}
    .nav-tab:hover{color:var(--text)}
    .nav-tab.active{color:var(--primary);border-bottom-color:var(--primary)}
    @media(max-width:480px){.nav-tab span{display:none}.nav-tab{padding:var(--sp-3) var(--sp-4)}}

    /* ─── MAIN ─── */
    .main{max-width:760px;margin:0 auto;padding:var(--sp-8) var(--sp-6)}
    .view{display:none}
    .view.active{display:block}

    /* ─── TIMER VIEW ─── */
    .timer-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);padding:var(--sp-12) var(--sp-8);text-align:center;box-shadow:var(--sh-sm)}
    .field-label{display:block;font-size:var(--tx-xs);text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:var(--sp-2)}
    .activity-input{background:transparent;border:none;border-bottom:2px solid var(--border);text-align:center;font-size:var(--tx-lg);font-weight:600;font-family:var(--font);color:var(--text);padding:var(--sp-2) var(--sp-4);width:100%;max-width:380px;margin-bottom:var(--sp-10)}
    .activity-input:focus{outline:none;border-bottom-color:var(--primary)}
    .activity-input::placeholder{color:var(--text-faint);font-weight:400}
    .activity-input:disabled{opacity:.6;cursor:default}
    .timer-digits{font-size:clamp(3rem,10vw,5.5rem);font-weight:700;color:var(--text);letter-spacing:-.025em;font-variant-numeric:tabular-nums;line-height:1;margin-bottom:var(--sp-10);transition:color var(--ease)}
    .timer-digits.live{color:var(--primary)}
    .btn-main{display:inline-flex;align-items:center;gap:var(--sp-3);padding:var(--sp-4) var(--sp-10);font-size:var(--tx-base);font-weight:600;font-family:var(--font);border-radius:var(--r-full);transition:background var(--ease),box-shadow var(--ease),transform var(--ease)}
    .btn-start{background:var(--primary);color:#fff;box-shadow:0 4px 18px oklch(from var(--primary) l c h/.28)}
    .btn-start:hover{background:var(--primary-h);box-shadow:0 6px 24px oklch(from var(--primary) l c h/.38);transform:translateY(-1px)}
    .btn-start:active{transform:translateY(0)}
    .btn-stop{background:#a12c7b;color:#fff;box-shadow:0 4px 18px oklch(.45 .15 330/.28)}
    [data-theme="dark"] .btn-stop{background:#d163a7;box-shadow:0 4px 18px oklch(.55 .2 330/.28)}
    .btn-stop:hover{background:#7d1e5e;transform:translateY(-1px)}
    [data-theme="dark"] .btn-stop:hover{background:#b9478f}
    .btn-stop:active{transform:translateY(0)}
    .timer-status{margin-top:var(--sp-5);font-size:var(--tx-sm);color:var(--text-muted);min-height:1.4em}
    .dot{display:inline-block;width:8px;height:8px;border-radius:var(--r-full);background:var(--primary);margin-right:var(--sp-2);animation:blink 1.4s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .saved-banner{margin-top:var(--sp-5);padding:var(--sp-3) var(--sp-5);background:var(--primary-hl2);border:1px solid var(--primary-hl);border-radius:var(--r-lg);font-size:var(--tx-sm);color:var(--primary);display:none}
    .saved-banner.show{display:block}

    /* ─── SECTION HEADING ─── */
    .sec-hd{font-size:var(--tx-lg);font-weight:700;color:var(--text);margin-bottom:var(--sp-6)}

    /* ─── HISTORY ─── */
    .empty{text-align:center;padding:var(--sp-16) var(--sp-8);color:var(--text-muted)}
    .empty svg{margin:0 auto var(--sp-4);color:var(--text-faint)}
    .empty p{font-size:var(--tx-sm);line-height:1.7}
    .sessions{display:flex;flex-direction:column;gap:var(--sp-3)}
    .session{display:flex;align-items:center;justify-content:space-between;gap:var(--sp-4);padding:var(--sp-4) var(--sp-5);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-sm);transition:box-shadow var(--ease)}
    .session:hover{box-shadow:var(--sh-md)}
    .s-left{display:flex;flex-direction:column;gap:2px;min-width:0}
    .s-name{font-weight:600;font-size:var(--tx-sm);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .s-date{font-size:var(--tx-xs);color:var(--text-muted)}
    .s-right{display:flex;align-items:center;gap:var(--sp-3);flex-shrink:0}
    .s-dur{font-weight:700;font-size:var(--tx-base);color:var(--primary);font-variant-numeric:tabular-nums;white-space:nowrap}
    .del-btn{width:30px;height:30px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;color:var(--text-faint);flex-shrink:0}
    .del-btn:hover{background:var(--surface-off);color:var(--error)}
    .clear-all{margin-top:var(--sp-6);display:flex;justify-content:flex-end}
    .btn-ghost{font-size:var(--tx-xs);color:var(--text-muted);padding:var(--sp-2) var(--sp-3);border-radius:var(--r-md)}
    .btn-ghost:hover{background:var(--surface-off);color:var(--error)}

    /* ─── STATS ─── */
    .kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:var(--sp-4);margin-bottom:var(--sp-6)}
    .kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:var(--sp-5);box-shadow:var(--sh-sm)}
    .kpi-lbl{font-size:var(--tx-xs);text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);margin-bottom:var(--sp-2)}
    .kpi-val{font-size:var(--tx-xl);font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;line-height:1.1}
    .kpi-sub{font-size:var(--tx-xs);color:var(--text-muted);margin-top:var(--sp-1)}
    .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:var(--sp-6);box-shadow:var(--sh-sm);margin-bottom:var(--sp-4)}
    .chart-hd{font-size:var(--tx-sm);font-weight:600;color:var(--text);margin-bottom:var(--sp-5)}
    .chart-wrap{position:relative;height:200px}
    .breakdown{margin-top:var(--sp-6)}
    .breakdown-title{font-size:var(--tx-sm);font-weight:600;color:var(--text);margin-bottom:var(--sp-4)}
    .act-row{display:flex;align-items:center;gap:var(--sp-4);padding:var(--sp-3) 0;border-bottom:1px solid var(--divider)}
    .act-row:last-child{border-bottom:none}
    .act-name{font-size:var(--tx-sm);font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .act-bar-wrap{flex:2;background:var(--surface-off);border-radius:var(--r-full);height:6px;overflow:hidden}
    .act-bar{height:100%;background:var(--primary);border-radius:var(--r-full);transition:width .6s cubic-bezier(.16,1,.3,1)}
    .act-dur{font-size:var(--tx-xs);color:var(--text-muted);font-variant-numeric:tabular-nums;white-space:nowrap;min-width:52px;text-align:right}

    @media(max-width:600px){
      .main{padding:var(--sp-6) var(--sp-4)}
      .timer-card{padding:var(--sp-8) var(--sp-4)}
      .kpis{grid-template-columns:repeat(2,1fr)}
      .btn-main{padding:var(--sp-4) var(--sp-8)}
    }
  </style>
</head>
<body>

<header class="hdr">
  <a class="logo" href="#">
    <svg class="logo-svg" width="28" height="28" viewBox="0 0 28 28" fill="none">
      <circle cx="14" cy="14" r="11" stroke="currentColor" stroke-width="2.2"/>
      <path d="M14 9v5.5l3.5 2" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M9.5 3.5L7.5 1.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M18.5 3.5L20.5 1.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    FocusTime
  </a>
  <button class="icon-btn" id="themeBtn" aria-label="Cambiar tema">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
</header>

<nav class="nav" role="tablist">
  <button class="nav-tab active" data-tab="timer" role="tab" aria-selected="true">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span>Temporizador</span>
  </button>
  <button class="nav-tab" data-tab="history" role="tab" aria-selected="false">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    <span>Historial</span>
  </button>
  <button class="nav-tab" data-tab="stats" role="tab" aria-selected="false">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    <span>Estadísticas</span>
  </button>
</nav>

<main class="main">

  <!-- TIMER -->
  <section class="view active" id="view-timer">
    <div class="timer-card">
      <label class="field-label" for="actName">Actividad</label>
      <input class="activity-input" id="actName" type="text"
        placeholder="Ej: Lectura, Estudio, Diseño…" maxlength="60" autocomplete="off">

      <div class="timer-digits" id="digits">00:00:00</div>

      <button class="btn-main btn-start" id="timerBtn" aria-label="Iniciar sesión">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Iniciar
      </button>

      <p class="timer-status" id="timerStatus" aria-live="polite"></p>
      <div class="saved-banner" id="savedBanner" role="status"></div>
    </div>
  </section>

  <!-- HISTORY -->
  <section class="view" id="view-history">
    <h2 class="sec-hd">Historial de sesiones</h2>
    <div id="historyBody"></div>
  </section>

  <!-- STATS -->
  <section class="view" id="view-stats">
    <h2 class="sec-hd">Estadísticas</h2>
    <div id="statsBody"></div>
  </section>

</main>

<script>
/* ════════════════════════════════
   STATE & STORAGE
════════════════════════════════ */
let sessions = [];
let running   = false;
let t0        = null;
let ticker    = null;
let barChart  = null;

function load(){
  try{ const d=localStorage.getItem('ft_v1'); if(d) sessions=JSON.parse(d); }catch(e){}
}
function save(){
  try{ localStorage.setItem('ft_v1',JSON.stringify(sessions)); }catch(e){}
}

/* ════════════════════════════════
   FORMAT HELPERS
════════════════════════════════ */
function fmtHMS(ms){
  const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  return `${p(h)}:${p(m)}:${p(sec)}`;
}
function p(n){return String(n).padStart(2,'0')}
function fmtHuman(ms){
  const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  if(h>0) return `${h}h ${m}m`;
  if(m>0) return `${m}m ${sec}s`;
  return `${sec}s`;
}
function fmtDate(ts){
  return new Date(ts).toLocaleDateString('es-AR',{weekday:'short',day:'numeric',month:'short'});
}
function fmtTime(ts){
  return new Date(ts).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
}

/* ════════════════════════════════
   TIMER
════════════════════════════════ */
const digEl   = document.getElementById('digits');
const btnEl   = document.getElementById('timerBtn');
const stEl    = document.getElementById('timerStatus');
const actEl   = document.getElementById('actName');
const bannerEl= document.getElementById('savedBanner');

btnEl.addEventListener('click',()=>{ running ? stopTimer() : startTimer(); });

function startTimer(){
  const name = actEl.value.trim() || 'Sin nombre';
  actEl.value = name;
  actEl.disabled = true;
  t0 = Date.now();
  running = true;
  digEl.classList.add('live');
  btnEl.className='btn-main btn-stop';
  btnEl.innerHTML=`<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> Detener`;
  stEl.innerHTML=`<span class="dot"></span>Sesión en curso — <strong>${name}</strong>`;
  bannerEl.classList.remove('show');
  ticker = setInterval(()=>{ digEl.textContent=fmtHMS(Date.now()-t0); },500);
}

function stopTimer(){
  clearInterval(ticker);
  const dur = Date.now()-t0;
  sessions.unshift({ id:Date.now(), activity:actEl.value.trim()||'Sin nombre', start:t0, end:Date.now(), duration:dur });
  save();
  running=false; t0=null;
  digEl.classList.remove('live');
  digEl.textContent='00:00:00';
  actEl.disabled=false;
  btnEl.className='btn-main btn-start';
  btnEl.innerHTML=`<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg> Iniciar`;
  stEl.textContent='';
  bannerEl.innerHTML=`✓ Sesión guardada — <strong>${fmtHuman(dur)}</strong>`;
  bannerEl.classList.add('show');
}

/* ════════════════════════════════
   HISTORY
════════════════════════════════ */
function renderHistory(){
  const el=document.getElementById('historyBody');
  if(!sessions.length){
    el.innerHTML=`<div class="empty">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <p>Aún no hay sesiones registradas.<br>¡Iniciá tu primera sesión en el temporizador!</p>
    </div>`;
    return;
  }
  const rows=sessions.map(s=>`
    <div class="session">
      <div class="s-left">
        <span class="s-name">${esc(s.activity)}</span>
        <span class="s-date">${fmtDate(s.start)} · ${fmtTime(s.start)}</span>
      </div>
      <div class="s-right">
        <span class="s-dur">${fmtHuman(s.duration)}</span>
        <button class="del-btn" onclick="delSession(${s.id})" aria-label="Eliminar sesión">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
    </div>`).join('');
  el.innerHTML=`<div class="sessions">${rows}</div>
    <div class="clear-all"><button class="btn-ghost" onclick="clearAll()">Borrar todo el historial</button></div>`;
}

function delSession(id){ sessions=sessions.filter(s=>s.id!==id); save(); renderHistory(); }
function clearAll(){ if(confirm('¿Borrar todo el historial?')){ sessions=[]; save(); renderHistory(); } }
window.delSession=delSession; window.clearAll=clearAll;

/* ════════════════════════════════
   STATS
════════════════════════════════ */
function monStart(){ const d=new Date(); d.setDate(1); d.setHours(0,0,0,0); return d; }
function weekStart(){
  const d=new Date(); const day=d.getDay();
  d.setDate(d.getDate()-((day===0?7:day)-1)); d.setHours(0,0,0,0); return d;
}

function renderStats(){
  const el=document.getElementById('statsBody');
  if(!sessions.length){
    el.innerHTML=`<div class="empty"><p>Registrá algunas sesiones para ver tus estadísticas.</p></div>`;
    if(barChart){barChart.destroy();barChart=null;} return;
  }
  const now=Date.now();
  const ws=weekStart().getTime();
  const ms=monStart().getTime();
  const wkSess=sessions.filter(s=>s.start>=ws);
  const moSess=sessions.filter(s=>s.start>=ms);
  const wkTotal=wkSess.reduce((a,s)=>a+s.duration,0);
  const allTotal=sessions.reduce((a,s)=>a+s.duration,0);
  const avgDur=sessions.length?allTotal/sessions.length:0;
  const wkSessions=wkSess.length;

  // % of waking hours this week (days elapsed * 16h)
  const dayOfWeek=new Date().getDay()||7; // Mon=1..Sun=7
  const daysElapsed=dayOfWeek;
  const wakeMs=daysElapsed*16*3600*1000;
  const pct=Math.min(100,Math.round((wkTotal/wakeMs)*100));

  el.innerHTML=`
    <div class="kpis">
      <div class="kpi">
        <div class="kpi-lbl">Esta semana</div>
        <div class="kpi-val">${fmtHuman(wkTotal)}</div>
        <div class="kpi-sub">${wkSessions} sesión${wkSessions!==1?'es':''}</div>
      </div>
      <div class="kpi">
        <div class="kpi-lbl">Este mes</div>
        <div class="kpi-val">${fmtHuman(moSess.reduce((a,s)=>a+s.duration,0))}</div>
        <div class="kpi-sub">${moSess.length} sesión${moSess.length!==1?'es':''}</div>
      </div>
      <div class="kpi">
        <div class="kpi-lbl">Total acumulado</div>
        <div class="kpi-val">${fmtHuman(allTotal)}</div>
        <div class="kpi-sub">${sessions.length} sesiones</div>
      </div>
      <div class="kpi">
        <div class="kpi-lbl">Promedio / sesión</div>
        <div class="kpi-val">${fmtHuman(avgDur)}</div>
        <div class="kpi-sub">duración media</div>
      </div>
      <div class="kpi">
        <div class="kpi-lbl">% de horas activas</div>
        <div class="kpi-val">${pct}%</div>
        <div class="kpi-sub">de esta semana</div>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-hd">Tiempo por día — últimos 7 días</div>
      <div class="chart-wrap"><canvas id="barCanvas"></canvas></div>
    </div>
    <div id="breakdownEl"></div>`;

  renderBar();
  renderBreakdown();
}

function renderBar(){
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  const tc=dark?'#797876':'#7a7974';
  const gc=dark?'#262523':'#dcd9d5';
  const ac=dark?'#4f98a3':'#01696f';
  const hl=dark?'#1e3135':'#cedcd8';

  const labels=[], vals=[];
  for(let i=6;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i); d.setHours(0,0,0,0);
    const nxt=new Date(d); nxt.setDate(nxt.getDate()+1);
    const ms=sessions.filter(s=>s.start>=d.getTime()&&s.start<nxt.getTime()).reduce((a,s)=>a+s.duration,0);
    labels.push(d.toLocaleDateString('es-AR',{weekday:'short',day:'numeric'}));
    vals.push(Math.round(ms/60000));
  }

  if(barChart) barChart.destroy();
  const ctx=document.getElementById('barCanvas');
  if(!ctx) return;
  barChart=new Chart(ctx,{
    type:'bar',
    data:{
      labels,
      datasets:[{
        data:vals,
        backgroundColor:vals.map((_,i)=>i===6?ac:hl),
        borderRadius:6, borderSkipped:false
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:c=>{const v=c.parsed.y;return v>=60?` ${Math.floor(v/60)}h ${v%60}m`:` ${v} min`;}}}
      },
      scales:{
        x:{ticks:{color:tc,font:{family:"'Satoshi',sans-serif",size:11}},grid:{display:false},border:{display:false}},
        y:{ticks:{color:tc,font:{family:"'Satoshi',sans-serif",size:11},callback:v=>v>=60?`${Math.floor(v/60)}h`:`${v}m`},grid:{color:gc},border:{display:false},beginAtZero:true}
      }
    }
  });
}

function renderBreakdown(){
  const el=document.getElementById('breakdownEl');
  if(!el) return;
  const map={};
  sessions.forEach(s=>{ map[s.activity]=(map[s.activity]||0)+s.duration; });
  const sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]);
  if(sorted.length<=1){el.innerHTML=''; return;}
  const maxMs=sorted[0][1];
  const rows=sorted.map(([name,ms])=>{
    const pct=Math.round((ms/maxMs)*100);
    return `<div class="act-row">
      <span class="act-name">${esc(name)}</span>
      <div class="act-bar-wrap"><div class="act-bar" style="width:${pct}%"></div></div>
      <span class="act-dur">${fmtHuman(ms)}</span>
    </div>`;
  }).join('');
  el.innerHTML=`<div class="chart-card"><div class="chart-hd">Por actividad — todo el tiempo</div>${rows}</div>`;
}

/* ════════════════════════════════
   NAVIGATION
════════════════════════════════ */
document.querySelectorAll('.nav-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.nav-tab').forEach(t=>{t.classList.remove('active');t.setAttribute('aria-selected','false');});
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    tab.classList.add('active'); tab.setAttribute('aria-selected','true');
    document.getElementById('view-'+tab.dataset.tab).classList.add('active');
    if(tab.dataset.tab==='history') renderHistory();
    if(tab.dataset.tab==='stats') renderStats();
  });
});

/* ════════════════════════════════
   THEME
════════════════════════════════ */
(function(){
  const btn=document.getElementById('themeBtn');
  const root=document.documentElement;
  let theme=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  root.setAttribute('data-theme',theme);
  setIcon();
  btn.addEventListener('click',()=>{
    theme=theme==='dark'?'light':'dark';
    root.setAttribute('data-theme',theme);
    setIcon();
    if(document.getElementById('view-stats').classList.contains('active')) renderStats();
  });
  function setIcon(){
    btn.innerHTML=theme==='dark'
      ?'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      :'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  }
})();

   UTILS
════════════════════════════════ */
function esc(str){ return str.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

/* INIT */
load();
</script>

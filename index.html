<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusTime</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,600,700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root,[data-theme="light"]{--bg:#f7f6f2;--surface:#f9f8f5;--surface-2:#fbfbf9;--surface-off:#f3f0ec;--divider:#dcd9d5;--border:#d4d1ca;--text:#28251d;--text-muted:#7a7974;--text-faint:#bab9b4;--primary:#01696f;--primary-h:#0c4e54;--primary-hl:#cedcd8;--primary-hl2:#e2eeec;--error:#a12c7b;--success:#437a22;--sh-sm:0 1px 2px oklch(0.2 0.01 80/0.06);--sh-md:0 4px 14px oklch(0.2 0.01 80/0.09);--sh-lg:0 12px 32px oklch(0.2 0.01 80/0.13);--r-sm:.375rem;--r-md:.5rem;--r-lg:.75rem;--r-xl:1rem;--r-full:9999px;--font:'Satoshi','Inter',sans-serif;--tx-xs:clamp(.75rem,.7rem + .25vw,.875rem);--tx-sm:clamp(.875rem,.8rem + .35vw,1rem);--tx-base:clamp(1rem,.95rem + .25vw,1.125rem);--tx-lg:clamp(1.125rem,1rem + .75vw,1.5rem);--tx-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);--sp-1:.25rem;--sp-2:.5rem;--sp-3:.75rem;--sp-4:1rem;--sp-5:1.25rem;--sp-6:1.5rem;--sp-8:2rem;--sp-10:2.5rem;--sp-12:3rem;--sp-16:4rem;--ease:180ms cubic-bezier(.16,1,.3,1)}
    [data-theme="dark"]{--bg:#171614;--surface:#1c1b19;--surface-2:#201f1d;--surface-off:#1d1c1a;--divider:#262523;--border:#393836;--text:#cdccca;--text-muted:#797876;--text-faint:#5a5957;--primary:#4f98a3;--primary-h:#227f8b;--primary-hl:#1e3135;--primary-hl2:#182a2d;--error:#d163a7;--success:#6daa45;--sh-sm:0 1px 2px oklch(0 0 0/.2);--sh-md:0 4px 14px oklch(0 0 0/.3);--sh-lg:0 12px 32px oklch(0 0 0/.4)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0} html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth} body{min-height:100dvh;font-family:var(--font);font-size:var(--tx-base);color:var(--text);background:var(--bg);line-height:1.6} button{cursor:pointer;background:none;border:none;font:inherit;color:inherit} a,button,input{transition:color var(--ease),background var(--ease),border-color var(--ease),box-shadow var(--ease)} :focus-visible{outline:2px solid var(--primary);outline-offset:3px;border-radius:var(--r-sm)}
    .hdr{display:flex;align-items:center;justify-content:space-between;padding:var(--sp-3) var(--sp-6);background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:var(--sh-sm)}
    .logo{display:flex;align-items:center;gap:var(--sp-2);font-weight:700;font-size:var(--tx-lg)} .logo-svg{color:var(--primary)} .icon-btn{width:36px;height:36px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;color:var(--text-muted)} .icon-btn:hover{background:var(--surface-off);color:var(--text)}
    .nav{display:flex;padding:0 var(--sp-6);background:var(--surface);border-bottom:1px solid var(--border)} .nav-tab{display:flex;align-items:center;gap:var(--sp-2);padding:var(--sp-3) var(--sp-5);font-size:var(--tx-sm);font-weight:500;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-1px} .nav-tab.active{color:var(--primary);border-bottom-color:var(--primary)}
    .main{max-width:760px;margin:0 auto;padding:var(--sp-8) var(--sp-6)} .view{display:none}.view.active{display:block}
    .timer-card,.chart-card,.kpi,.session{background:var(--surface);border:1px solid var(--border);box-shadow:var(--sh-sm)} .timer-card{border-radius:var(--r-xl);padding:var(--sp-12) var(--sp-8);text-align:center}.field-label{display:block;font-size:var(--tx-xs);text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:var(--sp-2)}
    .activity-input{background:transparent;border:none;border-bottom:2px solid var(--border);text-align:center;font-size:var(--tx-lg);font-weight:600;font-family:var(--font);color:var(--text);padding:var(--sp-2) var(--sp-4);width:100%;max-width:380px;margin-bottom:var(--sp-10)} .activity-input:focus{outline:none;border-bottom-color:var(--primary)} .activity-input::placeholder{color:var(--text-faint);font-weight:400} .activity-input:disabled{opacity:.6}
    .timer-digits{font-size:clamp(3rem,10vw,5.5rem);font-weight:700;color:var(--text);letter-spacing:-.025em;font-variant-numeric:tabular-nums;line-height:1;margin-bottom:var(--sp-10)} .timer-digits.live{color:var(--primary)}
    .btn-main{display:inline-flex;align-items:center;gap:var(--sp-3);padding:var(--sp-4) var(--sp-10);font-size:var(--tx-base);font-weight:600;border-radius:var(--r-full)} .btn-start{background:var(--primary);color:#fff}.btn-stop{background:#a12c7b;color:#fff}
    .timer-status{margin-top:var(--sp-5);font-size:var(--tx-sm);color:var(--text-muted);min-height:1.4em}.dot{display:inline-block;width:8px;height:8px;border-radius:9999px;background:var(--primary);margin-right:var(--sp-2);animation:blink 1.4s ease-in-out infinite}@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .saved-banner{margin-top:var(--sp-5);padding:var(--sp-3) var(--sp-5);background:var(--primary-hl2);border:1px solid var(--primary-hl);border-radius:var(--r-lg);font-size:var(--tx-sm);color:var(--primary);display:none}.saved-banner.show{display:block}
    .sec-hd{font-size:var(--tx-lg);font-weight:700;color:var(--text);margin-bottom:var(--sp-6)} .empty{text-align:center;padding:var(--sp-16) var(--sp-8);color:var(--text-muted)} .sessions{display:flex;flex-direction:column;gap:var(--sp-3)}
    .session{display:flex;align-items:center;justify-content:space-between;gap:var(--sp-4);padding:var(--sp-4) var(--sp-5);border-radius:var(--r-lg)} .s-left{display:flex;flex-direction:column;gap:2px;min-width:0}.s-name{font-weight:600;font-size:var(--tx-sm);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.s-date{font-size:var(--tx-xs);color:var(--text-muted)} .s-right{display:flex;align-items:center;gap:var(--sp-3);flex-shrink:0}.s-dur{font-weight:700;font-size:var(--tx-base);color:var(--primary);font-variant-numeric:tabular-nums;white-space:nowrap}.del-btn{width:30px;height:30px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;color:var(--text-faint)}
    .clear-all{margin-top:var(--sp-6);display:flex;justify-content:flex-end}.btn-ghost{font-size:var(--tx-xs);color:var(--text-muted);padding:var(--sp-2) var(--sp-3);border-radius:var(--r-md)}
    .kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:var(--sp-4);margin-bottom:var(--sp-6)} .kpi{border-radius:var(--r-lg);padding:var(--sp-5)} .kpi-lbl{font-size:var(--tx-xs);text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);margin-bottom:var(--sp-2)} .kpi-val{font-size:var(--tx-xl);font-weight:700;font-variant-numeric:tabular-nums;line-height:1.1}.kpi-sub{font-size:var(--tx-xs);color:var(--text-muted);margin-top:var(--sp-1)}
    .chart-card{border-radius:var(--r-lg);padding:var(--sp-6);margin-bottom:var(--sp-4)} .chart-hd{font-size:var(--tx-sm);font-weight:600;margin-bottom:var(--sp-5)} .chart-wrap{position:relative;height:200px}
    .act-row{display:flex;align-items:center;gap:var(--sp-4);padding:var(--sp-3) 0;border-bottom:1px solid var(--divider)} .act-row:last-child{border-bottom:none}.act-name{font-size:var(--tx-sm);font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.act-bar-wrap{flex:2;background:var(--surface-off);border-radius:9999px;height:6px;overflow:hidden}.act-bar{height:100%;background:var(--primary);border-radius:9999px}.act-dur{font-size:var(--tx-xs);color:var(--text-muted);font-variant-numeric:tabular-nums;white-space:nowrap;min-width:52px;text-align:right}
    @media(max-width:600px){.main{padding:var(--sp-6) var(--sp-4)}.timer-card{padding:var(--sp-8) var(--sp-4)}.kpis{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
<header class="hdr"><div class="logo"><svg class="logo-svg" width="28" height="28" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="11" stroke="currentColor" stroke-width="2.2"/><path d="M14 9v5.5l3.5 2" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>FocusTime</div><button class="icon-btn" id="themeBtn" aria-label="Cambiar tema">◐</button></header>
<nav class="nav" role="tablist"><button class="nav-tab active" data-tab="timer">Temporizador</button><button class="nav-tab" data-tab="history">Historial</button><button class="nav-tab" data-tab="stats">Estadísticas</button></nav>
<main class="main">
<section class="view active" id="view-timer"><div class="timer-card"><label class="field-label" for="actName">Actividad</label><input class="activity-input" id="actName" type="text" placeholder="Ej: Lectura, Estudio, Diseño…" maxlength="60"><div class="timer-digits" id="digits">00:00:00</div><button class="btn-main btn-start" id="timerBtn">Iniciar</button><p class="timer-status" id="timerStatus" aria-live="polite"></p><div class="saved-banner" id="savedBanner" role="status"></div></div></section>
<section class="view" id="view-history"><h2 class="sec-hd">Historial de sesiones</h2><div id="historyBody"></div></section>
<section class="view" id="view-stats"><h2 class="sec-hd">Estadísticas</h2><div id="statsBody"></div></section>
</main>
<script>
let sessions=[]; let runningState=null; let ticker=null; let barChart=null;
function load(){try{const d=localStorage.getItem('ft_v1'); if(d) sessions=JSON.parse(d)||[];}catch(e){} try{const r=localStorage.getItem('ft_running_v1'); if(r) runningState=JSON.parse(r);}catch(e){}}
function save(){try{localStorage.setItem('ft_v1',JSON.stringify(sessions));}catch(e){}}
function saveRunning(){try{if(runningState) localStorage.setItem('ft_running_v1',JSON.stringify(runningState)); else localStorage.removeItem('ft_running_v1');}catch(e){}}
function p(n){return String(n).padStart(2,'0')} function fmtHMS(ms){const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return `${p(h)}:${p(m)}:${p(sec)}`}
function fmtHuman(ms){const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;if(h>0) return `${h}h ${m}m`; if(m>0) return `${m}m ${sec}s`; return `${sec}s`;}
function fmtDate(ts){return new Date(ts).toLocaleDateString('es-AR',{weekday:'short',day:'numeric',month:'short'})} function fmtTime(ts){return new Date(ts).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}
function esc(str){return String(str).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
const digEl=document.getElementById('digits'), btnEl=document.getElementById('timerBtn'), stEl=document.getElementById('timerStatus'), actEl=document.getElementById('actName'), bannerEl=document.getElementById('savedBanner');
btnEl.addEventListener('click',()=> runningState ? stopTimer() : startTimer());
function startTimer(){const name=actEl.value.trim()||'Sin nombre'; runningState={activity:name,start:Date.now()}; saveRunning(); bannerEl.classList.remove('show'); syncRunningUI();}
function stopTimer(){if(!runningState) return; const end=Date.now(); const dur=Math.max(0,end-runningState.start); sessions.unshift({id:end,activity:runningState.activity||'Sin nombre',start:runningState.start,end,duration:dur}); save(); runningState=null; saveRunning(); syncRunningUI(); bannerEl.innerHTML=`✓ Sesión guardada — <strong>${fmtHuman(dur)}</strong>`; bannerEl.classList.add('show'); renderHistory(); renderStats();}
function syncRunningUI(){clearInterval(ticker); if(runningState){actEl.value=runningState.activity||'Sin nombre'; actEl.disabled=true; digEl.classList.add('live'); btnEl.className='btn-main btn-stop'; btnEl.textContent='Detener'; stEl.innerHTML=`<span class="dot"></span>Sesión en curso — <strong>${esc(runningState.activity||'Sin nombre')}</strong>`; const paint=()=>{digEl.textContent=fmtHMS(Date.now()-runningState.start)}; paint(); ticker=setInterval(paint,1000);} else {digEl.classList.remove('live'); digEl.textContent='00:00:00'; actEl.disabled=false; btnEl.className='btn-main btn-start'; btnEl.textContent='Iniciar'; stEl.textContent='';}}
function renderHistory(){const el=document.getElementById('historyBody'); if(!sessions.length){el.innerHTML='<div class="empty"><p>Aún no hay sesiones registradas.<br>Iniciá tu primera sesión.</p></div>'; return;} const rows=sessions.map(s=>`<div class="session"><div class="s-left"><span class="s-name">${esc(s.activity)}</span><span class="s-date">${fmtDate(s.start)} · ${fmtTime(s.start)}</span></div><div class="s-right"><span class="s-dur">${fmtHuman(s.duration)}</span><button class="del-btn" onclick="delSession(${s.id})">✕</button></div></div>`).join(''); el.innerHTML=`<div class="sessions">${rows}</div><div class="clear-all"><button class="btn-ghost" onclick="clearAll()">Borrar todo el historial</button></div>`;}
function delSession(id){sessions=sessions.filter(s=>s.id!==id); save(); renderHistory(); renderStats();} function clearAll(){if(confirm('¿Borrar todo el historial?')){sessions=[]; save(); renderHistory(); renderStats();}} window.delSession=delSession; window.clearAll=clearAll;
function monStart(){const d=new Date(); d.setDate(1); d.setHours(0,0,0,0); return d;} function weekStart(){const d=new Date(); const day=d.getDay(); d.setDate(d.getDate()-((day===0?7:day)-1)); d.setHours(0,0,0,0); return d;}
function renderStats(){const el=document.getElementById('statsBody'); if(!sessions.length){el.innerHTML='<div class="empty"><p>Registrá algunas sesiones para ver tus estadísticas.</p></div>'; if(barChart){barChart.destroy(); barChart=null;} return;} const ws=weekStart().getTime(), ms=monStart().getTime(); const wkSess=sessions.filter(s=>s.start>=ws), moSess=sessions.filter(s=>s.start>=ms); const wkTotal=wkSess.reduce((a,s)=>a+s.duration,0), moTotal=moSess.reduce((a,s)=>a+s.duration,0), allTotal=sessions.reduce((a,s)=>a+s.duration,0), avgDur=sessions.length?allTotal/sessions.length:0; const dayOfWeek=new Date().getDay()||7; const pct=Math.min(100,Math.round((wkTotal/(dayOfWeek*16*3600*1000))*100)); el.innerHTML=`<div class="kpis"><div class="kpi"><div class="kpi-lbl">Esta semana</div><div class="kpi-val">${fmtHuman(wkTotal)}</div><div class="kpi-sub">${wkSess.length} sesiones</div></div><div class="kpi"><div class="kpi-lbl">Este mes</div><div class="kpi-val">${fmtHuman(moTotal)}</div><div class="kpi-sub">${moSess.length} sesiones</div></div><div class="kpi"><div class="kpi-lbl">Total acumulado</div><div class="kpi-val">${fmtHuman(allTotal)}</div><div class="kpi-sub">${sessions.length} sesiones</div></div><div class="kpi"><div class="kpi-lbl">Promedio / sesión</div><div class="kpi-val">${fmtHuman(avgDur)}</div><div class="kpi-sub">duración media</div></div><div class="kpi"><div class="kpi-lbl">% de horas activas</div><div class="kpi-val">${pct}%</div><div class="kpi-sub">de esta semana</div></div></div><div class="chart-card"><div class="chart-hd">Tiempo por día — últimos 7 días</div><div class="chart-wrap"><canvas id="barCanvas"></canvas></div></div><div id="breakdownEl"></div>`; renderBar(); renderBreakdown();}
function renderBar(){const dark=document.documentElement.getAttribute('data-theme')==='dark'; const tc=dark?'#797876':'#7a7974', gc=dark?'#262523':'#dcd9d5', ac=dark?'#4f98a3':'#01696f', hl=dark?'#1e3135':'#cedcd8'; const labels=[],vals=[]; for(let i=6;i>=0;i--){const d=new Date(); d.setDate(d.getDate()-i); d.setHours(0,0,0,0); const nxt=new Date(d); nxt.setDate(nxt.getDate()+1); const ms=sessions.filter(s=>s.start>=d.getTime()&&s.start<nxt.getTime()).reduce((a,s)=>a+s.duration,0); labels.push(d.toLocaleDateString('es-AR',{weekday:'short',day:'numeric'})); vals.push(Math.round(ms/60000));} if(barChart) barChart.destroy(); const ctx=document.getElementById('barCanvas'); if(!ctx) return; barChart=new Chart(ctx,{type:'bar',data:{labels,datasets:[{data:vals,backgroundColor:vals.map((_,i)=>i===6?ac:hl),borderRadius:6,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>{const v=c.parsed.y; return v>=60?` ${Math.floor(v/60)}h ${v%60}m`:` ${v} min`;}}}},scales:{x:{ticks:{color:tc,font:{family:"'Satoshi',sans-serif",size:11}},grid:{display:false},border:{display:false}},y:{ticks:{color:tc,font:{family:"'Satoshi',sans-serif",size:11},callback:v=>v>=60?`${Math.floor(v/60)}h`:`${v}m`},grid:{color:gc},border:{display:false},beginAtZero:true}}}});}
function renderBreakdown(){const el=document.getElementById('breakdownEl'); if(!el) return; const map={}; sessions.forEach(s=>map[s.activity]=(map[s.activity]||0)+s.duration); const sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]); if(sorted.length<=1){el.innerHTML=''; return;} const maxMs=sorted[0][1]; el.innerHTML=`<div class="chart-card"><div class="chart-hd">Por actividad — todo el tiempo</div>${sorted.map(([name,ms])=>`<div class="act-row"><span class="act-name">${esc(name)}</span><div class="act-bar-wrap"><div class="act-bar" style="width:${Math.round((ms/maxMs)*100)}%"></div></div><span class="act-dur">${fmtHuman(ms)}</span></div>`).join('')}</div>`;}
for(const tab of document.querySelectorAll('.nav-tab')){tab.addEventListener('click',()=>{document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active')); document.querySelectorAll('.view').forEach(v=>v.classList.remove('active')); tab.classList.add('active'); document.getElementById('view-'+tab.dataset.tab).classList.add('active'); if(tab.dataset.tab==='history') renderHistory(); if(tab.dataset.tab==='stats') renderStats();});}
(function(){const btn=document.getElementById('themeBtn'); const root=document.documentElement; let theme=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'; root.setAttribute('data-theme',theme); btn.addEventListener('click',()=>{theme=theme==='dark'?'light':'dark'; root.setAttribute('data-theme',theme); if(document.getElementById('view-stats').classList.contains('active')) renderStats();});})();
document.addEventListener('visibilitychange',()=>{if(!document.hidden) syncRunningUI();}); window.addEventListener('pageshow',syncRunningUI); window.addEventListener('focus',syncRunningUI);
load(); syncRunningUI(); renderHistory(); renderStats();
</script>
</body>
</html>
